<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSUT Student Portal – Smart Scheduler</title>
    <link rel="stylesheet" href="/css/site.css?v=2" />
</head>
<body>

    <div id="app">

        <!-- HEADER -->
        <div id="header">
            <div id="header-inner">
                <img src="/images/PsutIconTransparent.png" alt="PSUT Logo" class="main-logo" />

                <div class="header-actions">

                    <button class="header-signout" onclick="logout()">
                        Sign Out
                        <span class="home-icon">🏠︎</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- LAYOUT -->
        <div id="layout">

            <!-- SIDEBAR -->
            <div id="sidebar">
                <div id="sidebar-inner">
                    <button class="sidebar-item" onclick="navigate('student-info')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4" /><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" /></svg>
                        Student Information
                    </button>
                    <button class="sidebar-item" onclick="navigate('current-schedule')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>
                        Current Schedule
                    </button>
                    <button class="sidebar-item" onclick="navigate('exams-schedule')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /><line x1="8" y1="15" x2="16" y2="15" /></svg>
                        Exams Schedule
                    </button>
                    <button class="sidebar-item" onclick="navigate('calc-average')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2" /><line x1="8" y1="8" x2="16" y2="8" /><line x1="8" y1="12" x2="16" y2="12" /><line x1="8" y1="16" x2="12" y2="16" /></svg>
                        Calc Average
                    </button>
                    <button class="sidebar-item" onclick="navigate('semesters-courses')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></svg>
                        Semesters Courses
                    </button>
                    <button class="sidebar-item" onclick="navigate('study-plan')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /></svg>
                        Study Plan
                    </button>
                    <button class="sidebar-item active" onclick="navigate('smart-scheduler')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>
                        Smart Scheduler
                    </button>
                    <button class="sidebar-item" onclick="navigate('registration')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" /><rect x="9" y="3" width="6" height="4" rx="1" /><line x1="9" y1="12" x2="15" y2="12" /><line x1="9" y1="16" x2="12" y2="16" /></svg>
                        Registration
                    </button>
                    <button class="sidebar-item" onclick="navigate('financial')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></svg>
                        Financial
                    </button>
                    <button class="sidebar-item" onclick="navigate('e-services')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" /></svg>
                        E-Services
                    </button>
                    <button class="sidebar-item" onclick="navigate('subscriptions')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><polyline points="9 15 12 18 15 12" /></svg>
                        Subscriptions
                    </button>
                    <button class="sidebar-item" onclick="navigate('survey')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></svg>
                        Survey
                    </button>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div id="main-content">
                <div class="content-area" id="content-area">
                    <!-- Rendered by JS -->
                </div>
            </div>

        </div><!-- /#layout -->
    </div><!-- /#app -->

    <script src="/js/site.js?v=1775403963"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

</body>
</html>
