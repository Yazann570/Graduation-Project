<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSUT Student Portal – Login</title>
    <link rel="stylesheet" href="/css/site.css" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f0f4f8;
        }



        /* ── Card ── */
        .login-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 36px 40px 40px;
            width: 100%;
            max-width: 440px;
        }

            .login-card h1 {
                font-size: 24px;
                color: #002C40;
                font-weight: 600;
                margin-bottom: 6px;
            }

            .login-card p.sub {
                font-size: 14px;
                color: #666;
                margin-bottom: 32px;
            }

        .form-group {
            margin-bottom: 20px;
        }

            .form-group label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: #333;
                margin-bottom: 6px;
            }

            .form-group input {
                width: 100%;
                padding: 12px 14px;
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 15px;
                font-family: inherit;
                outline: none;
                transition: border-color 0.15s, box-shadow 0.15s;
                letter-spacing: 2px;
            }

                .form-group input:focus {
                    border-color: #09618a;
                    box-shadow: 0 0 0 3px rgba(9,97,138,0.12);
                }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #09618a;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
        }

            .btn-login:hover {
                background: #075070;
            }

            .btn-login:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

        .error-msg {
            margin-top: 16px;
            padding: 12px 14px;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            color: #dc2626;
            font-size: 13px;
            display: none;
        }

            .error-msg.visible {
                display: block;
            }

        .hint {
            margin-top: 24px;
            padding: 14px;
            background: #f0f9ff;
            border-radius: 6px;
            border: 1px solid #bae6fd;
            font-size: 12px;
            color: #0369a1;
            line-height: 1.7;
        }

            .hint strong {
                display: block;
                margin-bottom: 4px;
                color: #002C40;
            }
    </style>
</head>
<body>



    <!-- Login card -->
    <div class="login-wrap">
        <div class="login-card">
            <!-- PSUT Logo centered above the form -->
            <div style="text-align:center; margin-bottom:28px;">
                <img src="/images/psutIcon.png" alt="PSUT Logo"
                     style="height:110px; object-fit:contain;" />
            </div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
                <div style="flex:1;height:1px;background:#e0e0e0;"></div>
                <span style="font-size:13px;color:#888;">تسجيل الدخول</span>
                <div style="flex:1;height:1px;background:#e0e0e0;"></div>
            </div>

            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" placeholder="e.g. 20210001"
                       maxlength="20" autocomplete="off" />
            </div>

            <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>

            <div class="error-msg" id="errorMsg"></div>

            <div class="hint">
                <strong>Test Accounts</strong>
                20210001 &nbsp;·&nbsp; 20220919 &nbsp;·&nbsp; 20220187
            </div>
        </div>
    </div>

    <script>
        // If already logged in, skip login page
        (async () => {
            try {
                const res = await fetch('/api/auth/me');
                const json = await res.json();
                if (json.Success) window.location.href = '/';
            } catch (_) { /* not logged in, stay on page */ }
        })();

        const input = document.getElementById('studentId');
        const btn = document.getElementById('loginBtn');
        const errBox = document.getElementById('errorMsg');

        // Allow pressing Enter
        input.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        async function doLogin() {
            const id = input.value.trim();
            if (!id) { showError('Please enter your Student ID.'); return; }

            btn.disabled = true;
            btn.textContent = 'Signing in…';
            hideError();

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ StudentId: id }),
                });
                const json = await res.json();

                if (json.Success) {
                    window.location.href = '/';
                } else {
                    showError(json.Message || 'Login failed.');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            } catch (e) {
                showError('Cannot reach the server. Make sure the app is running.');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        function showError(msg) {
            errBox.textContent = msg;
            errBox.classList.add('visible');
        }
        function hideError() {
            errBox.classList.remove('visible');
        }
    </script>

</body>
</html>
