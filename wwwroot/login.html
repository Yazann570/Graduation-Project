<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GJU Student Portal – Login</title>
    <link rel="stylesheet" href="/css/site.css" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f4f6f9;
        }

        /* ── Header ── */
        .login-header {
            background: linear-gradient(135deg, #002C40 0%, #09618a 40%, #0a8abf 70%, #1aa3cc 100%);
            padding: 0 32px;
            height: 90px;
            display: flex;
            align-items: center;
            gap: 18px;
        }

            .login-header .emblem {
                width: 64px;
                height: 64px;
                background: #fff;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 3px solid rgba(255,255,255,0.4);
                overflow: hidden;
                flex-shrink: 0;
            }

                .login-header .emblem img {
                    width: 100%;
                    height: 100%;
                    object-fit: contain;
                }

                .login-header .emblem svg {
                    width: 44px;
                    height: 44px;
                }

            .login-header .title {
                color: #fff;
            }

                .login-header .title .ar {
                    font-size: 18px;
                    font-weight: bold;
                }

                .login-header .title .en {
                    font-size: 13px;
                    opacity: 0.88;
                    margin-top: 2px;
                }

                .login-header .title .badge {
                    font-size: 11px;
                    background: rgba(255,255,255,0.15);
                    border: 1px solid rgba(255,255,255,0.3);
                    border-radius: 12px;
                    padding: 2px 10px;
                    display: inline-block;
                    margin-top: 4px;
                }

        /* ── Card ── */
        .login-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 420px;
        }

            .login-card h1 {
                font-size: 24px;
                color: #002C40;
                font-weight: 600;
                margin-bottom: 6px;
            }

            .login-card p.sub {
                font-size: 14px;
                color: #666;
                margin-bottom: 32px;
            }

        .form-group {
            margin-bottom: 20px;
        }

            .form-group label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: #333;
                margin-bottom: 6px;
            }

            .form-group input {
                width: 100%;
                padding: 12px 14px;
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 15px;
                font-family: inherit;
                outline: none;
                transition: border-color 0.15s, box-shadow 0.15s;
                letter-spacing: 2px;
            }

                .form-group input:focus {
                    border-color: #09618a;
                    box-shadow: 0 0 0 3px rgba(9,97,138,0.12);
                }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #09618a;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
        }

            .btn-login:hover {
                background: #075070;
            }

            .btn-login:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

        .error-msg {
            margin-top: 16px;
            padding: 12px 14px;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            color: #dc2626;
            font-size: 13px;
            display: none;
        }

            .error-msg.visible {
                display: block;
            }

        .hint {
            margin-top: 24px;
            padding: 14px;
            background: #f0f9ff;
            border-radius: 6px;
            border: 1px solid #bae6fd;
            font-size: 12px;
            color: #0369a1;
            line-height: 1.7;
        }

            .hint strong {
                display: block;
                margin-bottom: 4px;
                color: #002C40;
            }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="login-header">
        <div class="emblem">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="22" fill="#002C40" stroke="#09618a" stroke-width="2" />
                <path d="M24 8 L30 20 L44 20 L33 28 L37 42 L24 34 L11 42 L15 28 L4 20 L18 20 Z"
                      fill="#09618a" opacity="0.7" />
                <circle cx="24" cy="24" r="6" fill="#fff" opacity="0.9" />
                <text x="24" y="28" text-anchor="middle" fill="#002C40"
                      font-size="7" font-weight="bold" font-family="Arial">GJU</text>
            </svg>
        </div>
        <div class="title">
            <div class="ar">الجامعة الألمانية الأردنية</div>
            <div class="en">Princess Sumaya University for Technology</div>
            <div class="badge">Student Portal</div>
        </div>
    </div>

    <!-- Login card -->
    <div class="login-wrap">
        <div class="login-card">
            <h1>Welcome Back</h1>
            <p class="sub">Enter your Student ID to access the portal.</p>

            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" placeholder="e.g. 20210001"
                       maxlength="20" autocomplete="off" />
            </div>

            <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>

            <div class="error-msg" id="errorMsg"></div>

            <div class="hint">
                <strong>Test Accounts</strong>
                20210001 &nbsp;·&nbsp; 20220919 &nbsp;·&nbsp; 20220187
            </div>
        </div>
    </div>

    <script>
  // If already logged in, skip login page
  (async () => {
    try {
      const res  = await fetch('/api/auth/me');
      const json = await res.json();
      if (json.Success) window.location.href = '/';
    } catch (_) { /* not logged in, stay on page */ }
  })();

  const input  = document.getElementById('studentId');
  const btn    = document.getElementById('loginBtn');
  const errBox = document.getElementById('errorMsg');

  // Allow pressing Enter
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const id = input.value.trim();
    if (!id) { showError('Please enter your Student ID.'); return; }

    btn.disabled  = true;
    btn.textContent = 'Signing in…';
    hideError();

    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ StudentId: id }),
      });
      const json = await res.json();

      if (json.Success) {
        window.location.href = '/';
      } else {
        showError(json.Message || 'Login failed.');
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    } catch (e) {
      showError('Cannot reach the server. Make sure the app is running.');
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.add('visible');
  }
  function hideError() {
    errBox.classList.remove('visible');
  }
    </script>

</body>
</html>
