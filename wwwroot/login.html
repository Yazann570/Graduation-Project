<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSUT Student Portal – Login</title>
    <link rel="stylesheet" href="/css/site.css" />
    <style>
  body {
    min-height: 100vh;
    margin: 0;
    background: #ffffff;
    font-family: Helvetica, Arial, sans-serif;
    color: #5f6675;
}

/* top portal bar */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 66px;
    background: #fff;
    border-bottom: 1px solid #eeeeee;
    box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    z-index: -1;
}

/* bottom blue footer */
body::after {
    content: "";
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: 78px;
    background: #4f8499;
    z-index: -1;
}

.login-wrap {
    min-height: calc(100vh - 78px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 70px 16px 95px;
}

.login-card {
    background: #fff;
    width: 100%;
    max-width: 520px;
    padding: 28px 32px 34px;
    border-radius: 0;
    border: 0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.18);
}

.login-card img {
    height: 105px !important;
    object-fit: contain;
}

.login-card h1,
.login-card p.sub {
    display: none;
}

.login-card > div:first-child {
    margin-bottom: 30px !important;
}

.login-card > div:nth-child(2) {
    margin-bottom: 28px !important;
}

.login-card > div:nth-child(2) div {
    background: #dedede !important;
}

.login-card > div:nth-child(2) span {
    font-size: 14px !important;
    color: #5f6675 !important;
    font-weight: 600;
    border: 0 !important;
    padding: 0 10px !important;
}

.form-group {
    margin-bottom: 22px;
}

.form-group label {
    display: none;
}

.form-group input {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    border: 1px solid #cbd4ea;
    border-radius: 3px;
    background: #fff;
    color: #333;
    font-size: 15px;
    font-family: inherit;
    letter-spacing: 0;
    outline: none;
}

.form-group input::placeholder {
    color: #9aa7d9;
    font-weight: 600;
}

.form-group input:focus {
    border-color: #1aa3ff;
    box-shadow: none;
}

.btn-login {
    width: 100%;
    height: 48px;
    background: #ffffff;
    color: #1aa3ff;
    border: 1px solid #1aa3ff;
    border-radius: 3px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
}

.btn-login:hover {
    background: #f5fbff;
}

.btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.error-msg {
    margin-top: 16px;
    padding: 10px;
    background: #fff5f5;
    border: 1px solid #f5b5b5;
    color: #c03;
    font-size: 13px;
    display: none;
    text-align: center;
    border-radius: 3px;
}

.error-msg.visible {
    display: block;
}

.hint {
    margin-top: 26px;
    padding: 14px;
    background: #fff;
    border: 1px solid #dedede;
    border-radius: 3px;
    font-size: 12px;
    color: #5f6675;
    line-height: 1.7;
}

.hint strong {
    display: block;
    margin-bottom: 4px;
    color: #002C40;
}

/* fake footer links like portal */
        .login-wrap::after {
            content: "ABOUT US        CONTACT        PRIVACY POLICY";
            position: fixed;
            bottom: 48px;
            left: 0;
            right: 0;
            text-align: center;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            white-space: pre;
        }

/* simple geometric decoration approximation */
        .login-wrap::before {
            content: "";
            position: fixed;
            left: 0;
            right: 0;
            bottom: 78px;
            height: 95px;
            background-image: url("/images/psut-pattern.png");
            background-repeat: repeat-x;
            background-size: auto 95px;
            background-position: bottom center;
            pointer-events: none;
        }
        .login-topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 66px;
            background: #fff;
            border-bottom: 1px solid #eeeeee;
            box-shadow: 0 1px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            padding: 0 0 0 6px;
            z-index: 10;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 28px;
            color: #5f6675;
            font-size: 14px;
            font-weight: 700;
        }

        .topbar-logo {
            height: 100px;
            width: 100px;
            object-fit: contain;
        }

        .topbar-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-right {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="login-topbar">
        <div class="topbar-left">
            <img src="/images/psutIcon.png" alt="PSUT Logo" class="topbar-logo" />

            <span class="topbar-item">New Application</span>
            <span class="topbar-item">Semester Courses</span>
            <span class="topbar-item">Graduates</span>
        </div>
    </div>

    <!-- Login card -->
    <div class="login-wrap">
        <div class="login-card">
            <!-- PSUT Logo centered above the form -->
            <div style="text-align:center; margin-bottom:28px;">
                <img src="/images/psutIcon.png" alt="PSUT Logo"
                     style="height:110px; object-fit:contain;" />
            </div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
                <div style="flex:1;height:1px;background:#e0e0e0;"></div>
                <span style="font-size:16px;color:#003399;border-bottom:4px solid #09618a;padding-bottom:4px;">Login</span>
                <div style="flex:1;height:1px;background:#e0e0e0;"></div>
            </div>

            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" placeholder="e.g. 20210001"
                       maxlength="20" autocomplete="off" />
            </div>

            <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>

            <div class="error-msg" id="errorMsg"></div>

            <div class="hint">
                <strong>Test Accounts</strong>
                20210001 &nbsp;·&nbsp; 20220919 &nbsp;·&nbsp; 20220187
            </div>
        </div>
    </div>

    <script>
        // If already logged in, skip login page
        (async () => {
            try {
                const res = await fetch('/api/auth/me');
                const json = await res.json();
                if (json.Success) window.location.href = '/';
            } catch (_) { /* not logged in, stay on page */ }
        })();

        const input = document.getElementById('studentId');
        const btn = document.getElementById('loginBtn');
        const errBox = document.getElementById('errorMsg');

        // Allow pressing Enter
        input.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        async function doLogin() {
            const id = input.value.trim();
            if (!id) { showError('Please enter your Student ID.'); return; }

            btn.disabled = true;
            btn.textContent = 'Signing in…';
            hideError();

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ StudentId: id }),
                });
                const json = await res.json();

                if (json.Success) {
                    window.location.href = '/';
                } else {
                    showError(json.Message || 'Login failed.');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            } catch (e) {
                showError('Cannot reach the server. Make sure the app is running.');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        function showError(msg) {
            errBox.textContent = msg;
            errBox.classList.add('visible');
        }
        function hideError() {
            errBox.classList.remove('visible');
        }
    </script>

</body>
</html>
